services:
  mysql:
    image: mysql:8.0
    container_name: bodega_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '${DB_PORT_EXTERNAL}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent',
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  flyway:
    image: flyway/flyway:10
    container_name: bodega_flyway
    depends_on:
      mysql:
        condition: service_healthy
    command: -connectRetries=60 migrate
    environment:
      FLYWAY_URL: jdbc:mysql://mysql:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false
      FLYWAY_USER: ${DB_USERNAME}
      FLYWAY_PASSWORD: ${DB_PASSWORD}
      # ✅ Esto arregla el error de "schema no vacío sin history table"
      FLYWAY_BASELINE_ON_MIGRATE: 'true'
      # Como Flyway validó 4 migraciones, baselínea en 4 para que no intente ejecutar V1..V4 sobre tablas ya existentes
      FLYWAY_BASELINE_VERSION: '4'
      FLYWAY_BASELINE_DESCRIPTION: 'baseline_existing_schema'
    volumes:
      - ./flyway/sql:/flyway/sql:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bodega_api
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: '3306'
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_NAME}
      DB_USER: ${DB_USERNAME}
      DB_PASS: ${DB_PASSWORD}
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

volumes:
  mysql_data:
