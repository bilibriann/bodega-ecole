# ============================================================================
#  Dependabot — el "robot" de GitHub que vigila tus dependencias.
#
#  Qué hace: revisa periódicamente si alguna librería que usas tiene una
#  versión más nueva o una vulnerabilidad conocida, y AUTOMÁTICAMENTE abre
#  un Pull Request actualizándola. Tú solo revisas y apruebas.
#
#  No es un paso del CI: es un archivo de configuración que GitHub lee solo.
# ============================================================================
version: 2

updates:
  # --- 1) Dependencias de Node/npm (package.json) -------------------------
  - package-ecosystem: "npm"
    directory: "/"            # dónde está el package.json (raíz del repo)
    schedule:
      interval: "weekly"      # revisa una vez por semana
    open-pull-requests-limit: 5   # máximo 5 PRs abiertos a la vez (no spam)
    commit-message:
      prefix: "deps"          # los commits saldrán como "deps: ..."

  # --- 2) Las propias GitHub Actions del pipeline -------------------------
  # Mantiene actualizadas las acciones que usas (checkout, setup-node, etc.).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # --- 3) La imagen base del Dockerfile (node:20-alpine) ------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"
